services:
  - type: web
    name: credixo-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free # Change to 'starter' if you need persistent disk
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./credixo.db
      - key: MODEL_DIR
        value: /models
      - key: SKIP_DB_PERSISTENCE
        value: "false"
      - key: VITE_ANTHROPIC_API_KEY
        sync: false # You should set this manually in the Render dashboard
